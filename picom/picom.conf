# Transparencia
opacity-rule = [
    "85:class_g = 'kitty'",
    "90:class_g = 'Code'"
];

# Sombras
shadow = true;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.7;

# Bordes redondeados
corner-radius = 8;

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Backend
backend = "glx";
vsync = true;
